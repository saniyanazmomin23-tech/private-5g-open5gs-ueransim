# ===================================================================
# UERANSIM UE CONFIGURATION - MULTI-gNB FAILOVER (ONE VM)
# ===================================================================
# Works with: Open5GS + 2+ gNBs on same machine (127.0.0.1)
# Tested with: UERANSIM v3.2.6 | Open5GS v2.7.0
# ===================================================================

# UE Identity (IMSI)
supi: 'imsi-999700000000001'

# PLMN (MCC + MNC)
mcc: '999'
mnc: '70'

# Authentication (Null scheme - no SUCI encryption)
protectionScheme: 0

# Subscription Keys
key: '6874736969202073796d4b2079650a73'   # K
op: '504f20634f6320504f50206363500a4f'    # OPc
opType: 'OPC'
amf: '8000'

# Device Identifiers
imei: '356938035643803'
imeiSv: '4370816125816151'

# Data Network Name (DNN)
dnn: 'internet'

# TUN Interface (UE gets IP from UPF)
tunNetmask: '255.255.255.0'

# ===================================================================
# MULTI-gNB FAILOVER (KEY PART)
# ===================================================================
# List of gNB IPs for Radio Link Simulation (RLS)
# Even if gNBs share the same IP (127.0.0.1), UERANSIM will:
#   → Try each entry in order
#   → Auto-reselect if one gNB goes down
# ===================================================================
gnbSearchList:
  - 192.168.102.166 
    


# ===================================================================
# PDU Session to Establish
# ===================================================================
sessions:
  - type: 'IPv4'
    apn: 'internet'
    slice:
      sst: 1

# ===================================================================
# Network Slice Selection (NSSAI)
# ===================================================================
configured-nssai:
  - sst: 1

default-nssai:
  - sst: 1
    sd: 1

# ===================================================================
# Security Algorithms (All enabled for max compatibility)
# ===================================================================
integrity:
  IA1: true
  IA2: true
  IA3: true

ciphering:
  EA1: true
  EA2: true
  EA3: true

integrityMaxRate:
  uplink: 'full'
  downlink: 'full'

# ===================================================================
# Logging
# ===================================================================
logLevel: debug

# ===================================================================
# OPTIONAL: UAC (Access Control) - Keep defaults
# ===================================================================
uacAic:
  mps: false
  mcs: false

uacAcc:
  normalClass: 0
  class11: false
  class12: false
  class13: false
  class14: false
  class15: false
